services:
  app:
    build: .
    expose:
      - "8742"              # visible on the Docker network; Traefik connects here
    environment:
      DB_PATH: /app/data/pipeline.db
      FRONTEND_DIST: /app/frontend/dist
    volumes:
      # Persist the SQLite database across container restarts
      - ./data:/app/data
    networks:
      - aai-public        # ← add this alongside any existing networks
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aai-public"
      - "traefik.http.routers.pipeline.rule=Host(`pipeline.${BASE_DOMAIN}`)"
      - "traefik.http.routers.pipeline.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pipeline.middlewares=tfa@docker,secure-headers@file"
      - "traefik.http.services.pipeline.loadbalancer.server.port=8742"
    restart: unless-stopped

networks:
  aai-public:
    external: true           # must already exist on the host; Traefik owns it
